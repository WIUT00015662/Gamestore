services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gamestore-db
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_Password123}
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools18/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "${MSSQL_SA_PASSWORD:-Your_strong_Password123}", "-Q", "SELECT 1", "-No"]
      interval: 15s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Gamestore/Gamestore.Api/Dockerfile
    container_name: gamestore-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Server=db,1433;Database=GamestoreDb;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Password123};TrustServerCertificate=True;
      JwtSettings__Issuer: ${JWT_ISSUER:-Gamestore}
      JwtSettings__Audience: ${JWT_AUDIENCE:-GamestoreClient}
      JwtSettings__Key: ${JWT_KEY:-THIS_IS_A_DEMO_KEY_CHANGE_IN_PRODUCTION_1234567890}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  web:
    build:
      context: Gamestore/Gamestore.ReactUI
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: gamestore-web
    depends_on:
      - api
    ports:
      - "3000:80"

volumes:
  sql_data:
