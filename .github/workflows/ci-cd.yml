name: CI-CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: prod-deploy-main
  cancel-in-progress: false

env:
  DOTNET_VERSION: "8.0.x"
  NODE_VERSION: "20"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
  GCP_POOL_ID: ${{ vars.GCP_POOL_ID }}
  GCP_PROVIDER_ID: ${{ vars.GCP_PROVIDER_ID }}
  GCP_SERVICE_ACCOUNT: ${{ vars.GCP_SERVICE_ACCOUNT }}
  GCP_VM_NAME: ${{ vars.GCP_VM_NAME }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore backend
        run: dotnet restore Gamestore.sln

      - name: Build backend
        run: dotnet build Gamestore.sln --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test Gamestore/Gamestore.UnitTests/Gamestore.UnitTests.csproj --configuration Release --no-build

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Gamestore/Gamestore.ReactUI/package-lock.json

      - name: Install frontend dependencies
        working-directory: Gamestore/Gamestore.ReactUI
        run: npm ci

      - name: Frontend quality check
        working-directory: Gamestore/Gamestore.ReactUI
        run: npm run lint

      - name: Build frontend
        working-directory: Gamestore/Gamestore.ReactUI
        run: npm run build

  docker-build-and-push:
    runs-on: ubuntu-latest
    needs: quality-and-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Gamestore/Gamestore.Api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gamestore-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gamestore-api:${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v6
        with:
          context: Gamestore/Gamestore.ReactUI
          file: Gamestore/Gamestore.ReactUI/Dockerfile
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/gamestore-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/gamestore-web:${{ github.sha }}

  deploy-to-gcp-vm:
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ env.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ env.GCP_POOL_ID }}/providers/${{ env.GCP_PROVIDER_ID }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Deploy to GCP VM
        run: |
          gcloud compute ssh ${{ env.GCP_VM_NAME }} \
          --zone=${{ env.GCP_ZONE }} \
          --project=${{ env.GCP_PROJECT_ID }} \
          --quiet \
          --command='set -e
            mkdir -p /opt/gamestore/deployment/gcp/nginx
            curl -fsSL -o /opt/gamestore/docker-compose.prod.yml \
              https://raw.githubusercontent.com/WIUT00015662/Gamestore/main/docker-compose.prod.yml
            curl -fsSL -o /opt/gamestore/deployment/gcp/nginx/gamestore.conf \
              https://raw.githubusercontent.com/WIUT00015662/Gamestore/main/deployment/gcp/nginx/gamestore.conf
            cd /opt/gamestore
            echo "Disk space before cleanup:"
            df -h /
            docker container prune -f
            docker image prune -af
            docker builder prune -af
            docker compose --env-file deployment/gcp/.env.prod -f docker-compose.prod.yml pull
            docker compose --env-file deployment/gcp/.env.prod -f docker-compose.prod.yml down --remove-orphans
            docker compose --env-file deployment/gcp/.env.prod -f docker-compose.prod.yml up -d
            docker compose --env-file deployment/gcp/.env.prod -f docker-compose.prod.yml ps'
